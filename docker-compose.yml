
services:
  # Rails アプリケーション
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    environment:
      - RAILS_ENV=development          # 明示的に開発環境を指定
      - DB_HOST=host.docker.internal  # macOS用のローカルMySQL接続
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}  # パスワードを環境変数で設定
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
